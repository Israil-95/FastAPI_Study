services:
 db:
  image: mysql:8.0
  container_name: mysql_db_container
  restart: always
  environment:
   MYSQL_DATABASE: my_database
   MYSQL_ROOT_PASSWORD: root
   MYSQL_ROOT_HOST: '%'
  command: --default-authentication-plugin=mysql_native_password
  ports:
   - "3307:3306"
  volumes:
   - db_data:/var/lib/mysql

volumes:
 db_data:    